[build]
  publish = "."
  command = "echo done"
  ignore = "exit 0"

[build.environment]
  NETLIFY_USE_YARN = "false"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
